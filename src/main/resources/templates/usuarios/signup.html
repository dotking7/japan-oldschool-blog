<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: html(contenido=~{::section})}">
<body>
    <section class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="form-container p-5">
                    <h2 class="text-center text-accent mb-4">CREAR CUENTA</h2>
                    
                    <div th:if="${error}" class="alert alert-danger text-center bg-dark text-danger border-danger">
                        <p th:text="${error}" class="mb-0"></p>
                    </div>
                    
                    <form th:action="@{/usuarios/save}" method="post" th:object="${usuario}">
                        <div class="mb-4">
                            <label for="username" class="form-label">USUARIO</label>
                            <input type="text" class="form-control" id="username" th:field="*{username}" required>
                        </div>
                        
                        <div class="mb-4">
                            <label for="password" class="form-label">CONTRASEÑA</label>
                            <input type="password" class="form-control" id="password" th:field="*{password}" required>
                        </div>
                        
                        <button type="submit" class="btn btn-custom w-100">REGISTRARSE</button>
                    </form>
                    
                    <div class="text-center mt-4">
                        <p class="text-muted">¿Ya tienes cuenta? <a href="/login" class="text-accent text-decoration-none">Inicia sesion aqui</a></p>
                    </div>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
