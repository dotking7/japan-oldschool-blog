<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: html(contenido=~{::section})}">
<body>
    <section class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-7">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h1 class="text-accent mb-0" th:text="${usuario.idusuario != null ? 'EDITAR USUARIO' : 'CREAR USUARIO'}">USUARIO</h1>
                    <a href="/usuarios/listar" class="btn btn-outline-secondary">VOLVER</a>
                </div>

                <div class="form-container p-4 p-lg-5">
                    <div th:if="${error}" class="alert bg-dark text-danger border-danger text-center mb-4" th:text="${error}">ERROR</div>
                    
                    <form th:action="${usuario.idusuario != null ? '/usuarios/actualizar' : '/usuarios/guardar'}" 
                          th:object="${usuario}" method="post">
                        
                        <input type="hidden" th:field="*{idusuario}" th:if="${usuario.idusuario != null}">

                        <div class="mb-4">
                            <label class="form-label" for="username">NOMBRE DE USUARIO</label>
                            <input class="form-control" id="username" th:field="*{username}" required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label" for="password">CONTRASEÑA</label>
                            <input type="password" class="form-control" id="password" th:field="*{password}" 
                                   th:required="${usuario.idusuario == null}">
                            <small class="text-muted" th:if="${usuario.idusuario != null}">Dejala vacia para no cambiarla.</small>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">ROL</label>
                            <div class="row g-3">
                                <div class="col-sm-6" th:each="rol : ${roles}">
                                    <div class="form-check p-3 bg-dark rounded border border-secondary">
                                        <input class="form-check-input ms-0 me-2" type="radio" name="rolSeleccionado"
                                               th:value="${rol.idrol}" th:id="${'rol-' + rol.idrol}"
                                               th:checked="${usuario.roles != null and !usuario.roles.isEmpty() and usuario.roles.iterator().next().idrol == rol.idrol}">
                                        <label class="form-check-label text-accent fw-bold" th:for="${'rol-' + rol.idrol}" th:text="${rol.rol}">ROL</label>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="d-flex justify-content-end gap-3">
                            <a href="/usuarios/listar" class="btn btn-outline-secondary">CANCELAR</a>
                            <button type="submit" class="btn btn-custom px-5">GUARDAR</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
