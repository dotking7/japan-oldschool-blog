<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: html(contenido=~{::section})}">
<body>
    <section class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-6">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h1 class="text-accent mb-0" th:text="${marca.idmarca != null ? 'EDITAR MARCA' : 'CREAR MARCA'}">MARCA</h1>
                    <a href="/marcas/listar" class="btn btn-outline-secondary">VOLVER</a>
                </div>

                <div class="form-container p-4 p-lg-5">
                    <form th:action="${marca.idmarca != null ? '/marcas/actualizar' : '/marcas/guardar'}" 
                          th:object="${marca}" method="post">
                        
                        <input type="hidden" th:field="*{idmarca}" th:if="${marca.idmarca != null}">

                        <div class="mb-4">
                            <label for="nombre" class="form-label">NOMBRE DE LA MARCA</label>
                            <input type="text" id="nombre" class="form-control" th:field="*{nombre}" required 
                                   placeholder="Ej: Kawasaki">
                        </div>

                        <div class="d-flex justify-content-end gap-3">
                            <a href="/marcas/listar" class="btn btn-outline-secondary">CANCELAR</a>
                            <button type="submit" class="btn btn-custom px-4">
                                <i class="fas fa-save me-2"></i> GUARDAR MARCA
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
