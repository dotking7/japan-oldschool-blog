# ================================================================
# CONFIGURACION DE PRODUCCION - JAPAN OLDSCHOOL
# Las variables ${VAR} se leen de las Variables de entorno de Railway
# Los valores tras : son el fallback para desarrollo local
# ================================================================

# Base de datos (Railway inyecta JDBC_URL, MYSQL_USER, MYSQL_PASSWORD)
spring.datasource.url=${JDBC_URL:jdbc:mysql://localhost:3306/japan?serverTimezone=Europe/Madrid&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:temporal}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Thymeleaf
spring.thymeleaf.cache=true

# Subida de archivos (10MB max)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Ruta imagenes: en Railway apunta al volumen montado en /data/imagenes
japan.ruta.imagenes=${JAPAN_RUTA_IMAGENES:/data/imagenes/}

# Puerto: Railway inyecta PORT automaticamente
server.port=${PORT:8080}
