# ================================================================
# railway.toml - Configuracion de despliegue para Railway
# Colocar en la raiz del proyecto (junto a pom.xml)
# ================================================================

[build]
# Railway detecta Maven automaticamente con Nixpacks
builder = "nixpacks"

[deploy]
# JAR generado por Maven (artifactId-version.jar segun pom.xml)
startCommand = "java -jar target/blog-0.0.1-SNAPSHOT.jar"
healthcheckPath = "/"
healthcheckTimeout = 120
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
